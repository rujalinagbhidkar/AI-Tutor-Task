<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Tutor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

  <!-- ROBOT -->
  <div class="robot-section">
    <video id="robot-video" class="robot-video" muted loop playsinline>
      <source src="/static/robot.mp4" type="video/mp4">
    </video>
    <p id="status">🤖 Idle...</p>
  </div>

  <!-- CHAT -->
  <div class="chat-section">
    <h2>🎤 AI Tutor</h2>

    <div id="chat-box"></div>

    <button onclick="startVoice()">🎤 Speak</button>
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
